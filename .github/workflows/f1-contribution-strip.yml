name: F1 Contribution Strip

on:
  schedule:
    - cron: "0 0 * * *"   # Daily at midnight UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write           # Required to push to output branch

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd .github/scripts/f1-generator
          npm ci

      - name: Fetch contribution data & generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Cal2-0
        run: |
          cd .github/scripts/f1-generator
          node generate.js

      - name: Push SVGs to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Checkout or create output branch (orphan = no history bloat)
          git fetch origin output 2>/dev/null && git checkout output \
            || git checkout --orphan output && git rm -rf . --quiet

          # Copy generated SVGs into root
          cp .github/scripts/f1-generator/output/f1-strip-dark.svg  f1-strip-dark.svg
          cp .github/scripts/f1-generator/output/f1-strip-light.svg f1-strip-light.svg

          git add f1-strip-dark.svg f1-strip-light.svg
          git diff --cached --quiet || git commit -m "chore: regenerate F1 strip [skip ci]"
          git push origin output --force
