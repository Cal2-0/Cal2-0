name: F1 Contribution Strip

on:
  schedule:
    - cron: "0 0 * * *"   # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          cd .github/scripts/f1-generator
          npm install

      - name: Fetch contribution data & generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: Cal2-0
        run: |
          cd .github/scripts/f1-generator
          node generate.js

      - name: Push SVGs to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin output 2>/dev/null && git checkout output || git checkout --orphan output

          git rm -rf . >/dev/null 2>&1 || true

          mkdir -p .github/scripts/f1-generator/output

          cp .github/scripts/f1-generator/output/f1-strip-dark.svg f1-strip-dark.svg
          cp .github/scripts/f1-generator/output/f1-strip-light.svg f1-strip-light.svg

          git add f1-strip-dark.svg f1-strip-light.svg

          git diff --cached --quiet || git commit -m "chore: regenerate F1 strip [skip ci]"

          git push origin output --force
